### YamlMime:PowerShellCmdlet1
uid: MicrosoftPowerBIMgmt.Data.Get-PowerBIDataflowDatasource
name: Get-PowerBIDataflowDatasource
module: MicrosoftPowerBIMgmt.Data
isPreview: false
summary: |-
  Returns a list of Power BI data sources for the given Dataflow.
description: |-
  Retrieves a list of Power BI data sources under the specified dataflow that match the specified search criteria and scope.
  Data sources connected to Dataflows doesn't have a Name value, so there is no 'Name' parameter.
  For -Scope Individual, user must specify the dataflow's workspace, using the given -WorkspaceId value.
  Before you run this command, make sure you log in using Connect-PowerBIServiceAccount.
parameters:
  cmdletParameters:
  - name: Dataflow
    type: <xref href="Dataflow" data-throw-if-not-resolved="False" />
    description: |-
      Dataflow object to retrieve and return data sources for.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: DataflowAndId
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: DataflowAndList
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DataflowId
    type: <xref href="Guid" data-throw-if-not-resolved="False" />
    description: |-
      ID of the dataflow to retrieve and return data sources for.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: List
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: Id
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Id
    type: <xref href="Guid" data-throw-if-not-resolved="False" />
    description: |-
      ID of the data source to return.
    aliases:
    - DatasourceId
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Id
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: DataflowAndId
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Scope
    type: <xref href="PowerBIUserScope" data-throw-if-not-resolved="False" />
    description: |-
      Indicates scope of the call. Individual returns only data sources from dataflows assigned to the caller; Organization returns data sources for all dataflows within a tenant (must be an administrator to initiate). Individual is the default.
    acceptedValues:
    - Individual
    - Organization
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WorkspaceId
    type: <xref href="Guid" data-throw-if-not-resolved="False" />
    description: |-
      ID of the workspace to filter results to. Only data sources belonging to that workspace are shown. Available only when -Scope is Individual.
    aliases:
    - GroupId
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
