    ```Syntax
    Get-PowerBIDataflowDatasource
        -DataflowId <Guid>
        [-WorkspaceId <Guid>]
        [-Scope <PowerBIUserScope>]
        [<CommonParameters>]
    ```
  parameterSetName: List
  isDefault: true
- syntax: |-
    ```Syntax
    Get-PowerBIDataflowDatasource
        -DataflowId <Guid>
        -Id <Guid>
        [-WorkspaceId <Guid>]
        [-Scope <PowerBIUserScope>]
        [<CommonParameters>]
    ```
  parameterSetName: Id
  isDefault: false
- syntax: |-
    ```Syntax
    Get-PowerBIDataflowDatasource
        -Dataflow <Dataflow>
        -Id <Guid>
        [-WorkspaceId <Guid>]
        [-Scope <PowerBIUserScope>]
        [<CommonParameters>]
    ```
  parameterSetName: DataflowAndId
  isDefault: false
- syntax: |-
    ```Syntax
    Get-PowerBIDataflowDatasource
        -Dataflow <Dataflow>
