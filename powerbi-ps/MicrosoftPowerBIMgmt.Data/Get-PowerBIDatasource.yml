### YamlMime:PowerShellCmdlet1
uid: MicrosoftPowerBIMgmt.Data.Get-PowerBIDatasource
name: Get-PowerBIDatasource
module: MicrosoftPowerBIMgmt.Data
isPreview: false
summary: |-
  Returns a list of Power BI data sources.
description: |-
  Retrieves a list of Power BI data sources under the specified dataset along that match the specified search criteria and scope.
  Before you run this command, make sure you log in using Connect-PowerBIServiceAccount.
parameters:
  cmdletParameters:
  - name: Dataset
    type: <xref href="Dataset" data-throw-if-not-resolved="False" />
    description: |-
      Dataset for returning data sources for.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ObjectAndId
      position: Named
