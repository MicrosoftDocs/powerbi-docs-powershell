syntaxes:
- syntax: |-
    ```Syntax
    Add-PowerBIRow
        -Dataset <Dataset>
        -TableName <String>
        -Rows <System.Collections.Generic.List`1[System.Management.Automation.PSObject]>
        [-WorkspaceId <Guid>]
        [-Workspace <Workspace>]
        [<CommonParameters>]
    ```
  parameterSetName: Dataset
  isDefault: true
- syntax: |-
