uid: MicrosoftPowerBIMgmt.Data.Add-PowerBIRow
name: Add-PowerBIRow
module: MicrosoftPowerBIMgmt.Data
isPreview: false
summary: |-
  Adds rows to the specified table in a Power BI dataset.
description: |-
  Inserts rows into a Power BI table contained within a dataset.
