### YamlMime:PowerShellCmdlet1
uid: MicrosoftPowerBIMgmt.Profile.Invoke-PowerBIRestMethod
name: Invoke-PowerBIRestMethod
module: MicrosoftPowerBIMgmt.Profile
isPreview: false
summary: |-
  Executes a REST call to the Power BI service, with the specified URL and body.
description: |-
  Invokes a REST request against the Power BI service using the profile you're logged in with.
  The REST verb can be specified using the -Method parameter. The -Body parameter is required for the verbs POST, PUT, and PATCH.
  Before you run this command, make sure you log in using Connect-PowerBIServiceAccount.
parameters:
  cmdletParameters:
  - name: Body
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Body of the request, also known as *content*. This is optional unless the request method is POST, PUT, or PATCH.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ContentType
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Content type to specify inside the header for the request. Default is 'application/json'.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Headers
    type: <xref href="Hashtable" data-throw-if-not-resolved="False" />
    description: |-
      Optional headers to include with the request.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Method
    type: <xref href="PowerBIWebRequestMethod" data-throw-if-not-resolved="False" />
    description: |-
      Type of HTTP request method\verb to make with the call.
    acceptedValues:
    - Get
    - Post
    - Delete
    - Put
    - Patch
    - Options
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
