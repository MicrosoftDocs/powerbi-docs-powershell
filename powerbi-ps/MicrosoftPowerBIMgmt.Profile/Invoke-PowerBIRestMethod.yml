      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Organization
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Organization name or tenant GUID to include in the URL. Default is 'myorg'.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
