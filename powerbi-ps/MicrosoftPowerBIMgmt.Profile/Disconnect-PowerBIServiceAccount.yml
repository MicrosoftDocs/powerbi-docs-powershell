uid: MicrosoftPowerBIMgmt.Profile.Disconnect-PowerBIServiceAccount
name: Disconnect-PowerBIServiceAccount
module: MicrosoftPowerBIMgmt.Profile
isPreview: false
summary: |-
  Log out of the Power BI service.
description: |-
  Disconnects from any previous PowerBI Service connections.
  If there were no connections, the command completes without error.
syntaxes:
- syntax: |-
    ```Syntax
    Disconnect-PowerBIServiceAccount
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    PS C:\> Disconnect-PowerBIServiceAccount
    ```

    Disconnects any active PowerBI service connections.
