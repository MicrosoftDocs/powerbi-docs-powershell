syntaxes:
- syntax: |-
    ```Syntax
    Get-PowerBIImport
        [-Scope <PowerBIUserScope>]
        [-Filter <String>]
        [-First <Int32>]
        [-Skip <Int32>]
        [-WorkspaceId <Guid>]
        [<CommonParameters>]
    ```
  parameterSetName: List
  isDefault: true
- syntax: |-
    ```Syntax
    Get-PowerBIImport
        -Id <Guid>
        [-Scope <PowerBIUserScope>]
        [-WorkspaceId <Guid>]
        [<CommonParameters>]
    ```
  parameterSetName: Id
  isDefault: false
- syntax: |-
    ```Syntax
    Get-PowerBIImport
        -Id <Guid>
        -Workspace <Workspace>
        [-Scope <PowerBIUserScope>]
        [<CommonParameters>]
    ```
  parameterSetName: ObjectAndId
  isDefault: false
- syntax: |-
    ```Syntax
    Get-PowerBIImport
        -Name <String>
        [-Scope <PowerBIUserScope>]
        [-WorkspaceId <Guid>]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: false
- syntax: |-
    ```Syntax
    Get-PowerBIImport
        -Name <String>
        -Workspace <Workspace>
        [-Scope <PowerBIUserScope>]
        [<CommonParameters>]
    ```
  parameterSetName: ObjectAndName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-PowerBIImport
        -Workspace <Workspace>
        [-Scope <PowerBIUserScope>]
        [-Filter <String>]
        [-First <Int32>]
        [-Skip <Int32>]
        [<CommonParameters>]
    ```
  parameterSetName: ObjectAndList
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Collections.Generic.IEnumerable`1" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    PS C:\> Get-PowerBIImport
    ```

    Returns all Power BI workspaces that the calling user is assigned to (-Scope Individual).
- title: Example 2
  description: |-
    ```powershell
    PS C:\> Get-PowerBIImport -Scope Organization
    ```

    Returns all Power BI imports within the user's organization.
