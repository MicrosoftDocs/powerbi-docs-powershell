### YamlMime:PowerShellCmdlet1
uid: MicrosoftPowerBIMgmt.Reports.Get-PowerBIImport
name: Get-PowerBIImport
module: MicrosoftPowerBIMgmt.Reports
isPreview: false
summary: |-
  Returns a list of Power BI imports.
description: |-
  Retrieves a list of Power BI imports that match the specified search criteria and scope.
  Before you run this command, make sure you log in using Connect-PowerBIServiceAccount.
parameters:
  cmdletParameters:
  - name: Filter
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      OData filter, case-sensitive (element names start lowercase). Only supported when -Scope Organization is specified.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: List
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: ObjectAndList
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: First
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      First (top) list of results.
    aliases:
    - Top
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: List
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: ObjectAndList
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Id
