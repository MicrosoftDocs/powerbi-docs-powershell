syntaxes:
- syntax: |-
    ```Syntax
    Get-PowerBIWorkspace
        [-Scope <PowerBIUserScope>]
        [-Filter <String>]
        [-User <String>]
        [-Deleted]
        [-Orphaned]
        [-Type <WorkspaceType>]
        [-First <Int32>]
        [-Skip <Int32>]
        [-Include <ArtifactType[]>]
        [<CommonParameters>]
    ```
  parameterSetName: List
  isDefault: true
- syntax: |-
    ```Syntax
    Get-PowerBIWorkspace
        -Id <Guid>
        [-Scope <PowerBIUserScope>]
        [-Type <WorkspaceType>]
        [-Include <ArtifactType[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Id
  isDefault: false
- syntax: |-
    ```Syntax
    Get-PowerBIWorkspace
        -Name <String>
        [-Scope <PowerBIUserScope>]
        [-Type <WorkspaceType>]
        [-Include <ArtifactType[]>]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: false
- syntax: |-
    ```Syntax
    Get-PowerBIWorkspace
        [-Scope <PowerBIUserScope>]
        [-Filter <String>]
        [-User <String>]
        [-Deleted]
        [-Orphaned]
        [-Type <WorkspaceType>]
        [-Include <ArtifactType[]>]
        [-All]
        [<CommonParameters>]
    ```
  parameterSetName: All
  isDefault: false
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Collections.Generic.IEnumerable`1" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```powershell
    PS C:\> Get-PowerBIWorkspace
    ```

    Returns the first 100 Power BI workspaces the calling user is assigned to (-Scope Individual).
- title: Example 2
  description: |-
    ```powershell
    PS C:\> Get-PowerBIWorkspace -All
    ```

    Returns all Power BI workspaces the calling user is assigned to.
- title: Example 3
  description: |-
    ```powershell
    PS C:\> Get-PowerBIWorkspace -Scope Organization -Filter "tolower(name) eq 'contoso sales'"
    ```

    Returns a workspace named 'Contoso Sales' (case insensitive with tolower) within the user's organization.
- title: Example 3
  description: |-
    ```powershell
    PS C:\> Get-PowerBIWorkspace -Scope Organization -Include All
    ```

    Returns all Power BI workspaces along with related reports, dashboards, datasets, dataflows and workbooks within the user's organization.
