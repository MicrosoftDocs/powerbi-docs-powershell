### YamlMime:PowerShellCmdlet1
uid: MicrosoftPowerBIMgmt.Workspaces.Get-PowerBIWorkspace
name: Get-PowerBIWorkspace
module: MicrosoftPowerBIMgmt.Workspaces
isPreview: false
summary: |-
  Returns a list of Power BI workspaces.
description: |-
  Retrieves a list of Power BI workspaces that match the specified search criteria and scope.
  By default (without -First parameter) it shows the first 100 workspaces assigned to the user. Use -First and -Skip to fetch more workspaces or use -All to return all workspaces. The -First parameter can be used to return at most 5000 workspaces.
  Before you run this command, make sure you log in using Connect-PowerBIServiceAccount.
parameters:
  cmdletParameters:
  - name: All
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates to show all the workspaces. -First and -Skip cannot be used with this parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: All
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Deleted
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates to show only deleted workspaces. Only supported when -Scope Organization is specified.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: List
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: All
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Filter
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      OData filter, case-sensitive (element names start lowercase).
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: List
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: All
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: First
