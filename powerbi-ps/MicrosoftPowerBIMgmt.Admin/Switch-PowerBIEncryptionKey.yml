### YamlMime:PowerShellCmdlet1
uid: MicrosoftPowerBIMgmt.Admin.Switch-PowerBIEncryptionKey
name: Switch-PowerBIEncryptionKey
module: MicrosoftPowerBIMgmt.Admin
isPreview: false
summary: |-
  Switch the encryption key for Power BI workspaces assigned to a capacity.
description: |-
  Rotate the customer owned key for the tenant.
  Make sure the current encryption key and new version of key is valid.
  Grant wrap and unwrap key permissions for Power BI service in the Azure Key Vault.

  Before you run this command, make sure you log in using Connect-PowerBIServiceAccount.
  This cmdlet requires the calling user to be a tenant administrator of the Power BI service.
parameters:
  cmdletParameters:
  - name: KeyVaultKeyUri
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Uri to the version of the "Azure Key Vault" key to be used. Only supports 4096 bytes key.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      The name of the encryption key.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Switch-PowerBIEncryptionKey
        -Name <String>
        -KeyVaultKeyUri <String>
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.PowerBI.Common.Api.Encryption.EncryptionKey" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> Switch-PowerBIEncryptionKey -Name 'Contoso Sales' -KeyVaultKeyUri 'https://contoso-vault2.vault.azure.net/keys/ContosoKeyVault/b2ab4ba1c7b341eea5ecaaa2wb54c4d2'
    ```
