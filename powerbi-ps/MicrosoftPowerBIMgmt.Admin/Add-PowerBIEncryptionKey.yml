  - name: Activate
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates to activate any inactivated capacities to use this key for its encryption
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: DefaultAndActivate
      position: Named
      isRequired: false
      valueFromPipeline: false
